# ==========================================
#  IrisClaw Nginx 反向代理配置
#
#  使用方法：
#  1. 将此文件复制到 /etc/nginx/sites-available/irisclaw
#  2. 将 server_name 替换为你的域名
#  3. 创建软链接：ln -s /etc/nginx/sites-available/irisclaw /etc/nginx/sites-enabled/
#  4. 用 certbot 申请证书（会自动修改 SSL 配置）
#  5. nginx -t && systemctl reload nginx
# ==========================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;  # ← 替换为你的域名

    # Let's Encrypt 验证路径（certbot 需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求全部重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;  # ← 替换为你的域名

    # ---------- SSL 证书（Let's Encrypt 标准路径） ----------
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---------- 安全头 ----------
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- 可选：HTTP Basic Auth 密码保护 ----------
    # 启用方法：
    # 1. 安装 apache2-utils：apt install apache2-utils
    # 2. 创建密码文件：htpasswd -c /etc/nginx/.htpasswd 用户名
    # 3. 取消下面两行注释
    #
    # auth_basic "IrisClaw";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # ---------- SSE 专用：/api/chat ----------
    # SSE 长连接需要关闭缓冲，否则流式输出会被 Nginx 缓冲到完成才一次性发给客户端
    location /api/chat {
        proxy_pass http://127.0.0.1:8192;

        # 关键：关闭代理缓冲，确保 SSE 实时到达
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        # SSE 连接可能持续较长时间（工具执行等），默认 60s 太短
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE 所需的头
        proxy_set_header Connection '';
        proxy_http_version 1.1;

        # 传递客户端真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 通用反向代理 ----------
    location / {
        proxy_pass http://127.0.0.1:8192;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果将来需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
